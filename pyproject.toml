    "click>=8.1.0",
    "cryptography>=46.0.3",
    "discord-py>=2.6.4",
    "docker>=7.1.0",
    "faker>=40.18.0",
    "fastapi>=0.119.0",
    "kafka-python>=2.2.15",
    "kubernetes>=36.0.0",
    "mkdocs>=1.6.1",
    "mkdocs-material>=9.7.6",
    "mkdocstrings[python]>=1.0.4",
