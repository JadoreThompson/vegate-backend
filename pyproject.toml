    "pydantic-ai-slim[mistral]>=1.27.0",
    "pydantic[email,email-validator]>=2.12.0",
    "pyinstrument>=5.1.2",
    "pyjwt>=2.10.1",
    "pytest>=9.0.1",
    "pytest-asyncio>=1.3.0",
    "pytest-mock>=3.15.1",
    "python-dotenv>=1.1.1",
    "python-multipart>=0.0.29",
    "pyyaml>=6.0.3",
    "redis>=7.0.1",
    "sqlalchemy>=2.0.44",
    "uvicorn>=0.37.0",
    "websockets>=15.0.1",
