services:
  postgres:
    image: postgres:18
    container_name: vegate_postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - ${DB_PORT}:5432
    volumes:
      - vegate_postgres:/var/lib/postgresql

  postgres_test:
    image: postgres:18
    container_name: vegate_postgres_test
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - ${DB_PORT}:5432

  redis:
    image: redis:7
    container_name: vegate_redis
    restart: unless-stopped
    ports:
      - ${REDIS_PORT}:6379
    volumes:
      - vegate_redis:/data
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]

volumes:
  vegate_postgres:
  vegate_redis:
