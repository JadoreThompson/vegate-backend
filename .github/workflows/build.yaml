name: Build image
on:
  push:
    branches:
      - main

jobs:
  setup:
    name: Setup
    runs-on: self-hosted
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Initialise swarm manager
        run: docker swarm init || true

      - name: Create network
        run: |
          if ! docker network inspect vegate_network >/dev/null 2>&1; then
            docker network create \
              --driver overlay \
              --attachable vegate_network
          fi

  test:
    name: Test
    runs-on: self-hosted
    needs: [setup]
    steps:
      - name: Create .env.test
        run: |
          set -e

          cat <<'EOF' > .env.test
          ${{ secrets.ENV_TEST_FILE }}
          EOF

          if [ ! -f .env.test ]; then
            exit 1
          fi

      - name: Create test infra
        run: |
          docker compose \
            -p test \
            -f docker-compose.infra.yaml \
            -f docker-compose.infra.network.yaml \
            --env-file .env.test \
            up -d --force-recreate

          # Wait for Postgres to be ready
          until docker exec vegate_postgres_test pg_isready -U postgres; do
            sleep 1
          done

      - name: Build image
        run: docker build -t vegate-backend-test --no-cache .

      - name: Run tests
        run: |
          docker run \
          --rm \
          --network vegate_network \
          --name vegate-backend-test \
          vegate-backend-test uv run pytest -s -x

      - name: Cleanup
        if: always()
        run: |
          docker compose \
            -p test \
            -f docker-compose.infra.yaml \
            -f docker-compose.infra.network.yaml \
            --env-file .env.test \
            down

  deploy:
    name: Deploy services
    runs-on: self-hosted
    needs: [test]
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create .env
        run: |
          set -e

          cat <<'EOF' > .env
          ${{ secrets.ENV_FILE }}
          EOF

          if [ ! -f .env ]; then
            exit 1
          fi

      - name: Create infra
        run: |
          docker compose \
            -p prod \
            -f docker-compose.infra.yaml \
            -f docker-compose.infra.network.yaml \
            -f docker-compose.infra.volumes.yaml \
            up -d

          for i in $(seq 1 60); do
            if docker exec vegate_postgres_prod pg_isready -U postgres; then
              break
            fi

            sleep 1
          done

          if [ "$i" -eq 60 ]; then
            echo "Postgres did not become ready within 60s"
            exit 1
          fi

      - name: Build Image
        run: |
          TAG=$(openssl rand -hex 16)

          docker build \
            -f Dockerfile \
            -t wifimemes/vegate-backend:$TAG \
            -t wifimemes/vegate-backend:latest \
            --no-cache \
            .

          docker push wifimemes/vegate-backend:latest
          docker push wifimemes/vegate-backend:$TAG

      - name: Build docs image
        run: |
          TAG=$(openssl rand -hex 16)

          docker build \
            -f docs.Dockerfile \
            -t wifimemes/vegate-backend-docs:$TAG \
            -t wifimemes/vegate-backend-docs:latest \
            --no-cache \
            .

          docker push wifimemes/vegate-backend-docs:latest
          docker push wifimemes/vegate-backend-docs:$TAG

      - name: Upgrade DB
        run: docker run --rm --name upgrade-db --network vegate_network wifimemes/vegate-backend:latest uv run src/main.py db upgrade

      - name: Deploy stack
        run: docker stack deploy -c docker-compose.services.yaml -d=false vegate_stack

  cleanup:
    name: Cleanup
    runs-on: self-hosted
    needs: [setup, test, deploy]
    if: always()
    steps:
      - name: Prune images
        run: docker system prune -af
