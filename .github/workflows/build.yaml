name: Build image
on:
  push:
    branches:
      - main

jobs:
  setup:
    name: Setup
    runs-on: self-hosted
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create .env
        run: |
          set -e

          cat <<'EOF' > .env
          ${{ secrets.ENV_FILE }}
          EOF

          if [ ! -f .env ]; then
            exit 1
          fi

      - name: Initialise swarm manager
        run: sudo docker swarm init || true

      - name: Create network
        run: |
          if ! sudo docker network inspect vegate_network >/dev/null 2>&1; then
            sudo docker network create \
              --driver overlay \
              --attachable vegate_network
          fi

      - name: Compose infra
        run: docker compose -f infra-compose.yaml up -d --force-recreate postgres kafka redis

  test:
    name: Run Tests
    runs-on: self-hosted
    needs: setup
    steps:
      - name: Initialise test db
        run: |
          sudo docker compose -f  infra-compose.yaml --env-file .env.test up -d postgres_test

          # Wait for Postgres to be ready
          until sudo docker exec vegate_postgres_test pg_isready -U postgres; do
            sleep 1
          done

      - name: Create .env.test
        run: |
          set -e

          cat <<'EOF' > .env.test
          ${{ secrets.ENV_TEST_FILE }}
          EOF

          if [ ! -f .env.test ]; then
            exit 1
          fi

      - name: Build image
        run: |
          set -e
          docker build -f Dockerfile -t vegate-backend-test --no-cache .

      - name: Run tests
        run: docker run --network vegate_network --name vegate-backend-test vegate-backend-test uv run pytest -s -x

  deploy:
    name: Deploy services
    runs-on: self-hosted
    needs: test
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create .env
        run: |
          set -e

          cat <<'EOF' > .env
          ${{ secrets.ENV_FILE }}
          EOF

          if [ ! -f .env ]; then
            exit 1
          fi

      - name: Build Image
        run: |
          TAG=$(openssl rand -hex 16)

          sudo docker build \
            -f Dockerfile \
            -t wifimemes/vegate-backend:$TAG \
            -t wifimemes/vegate-backend:latest \
            --no-cache \
            .

          sudo docker push wifimemes/vegate-backend:latest
          sudo docker push wifimemes/vegate-backend:$TAG

      - name: Upgrade DB
        run: docker run --rm --name upgrade-db --network vegate_network wifimemes/vegate-backend:latest uv run src/main.py db upgrade

      - name: Deploy stack
        run: docker stack deploy -c prod-compose.yaml -d=false vegate_stack

  cleanup:
    name: Cleanup
    runs-on: self-hosted
    if: always()
    needs: [setup, test, deploy]

    steps:
      - name: Prune images
        run: sudo docker system prune -af
