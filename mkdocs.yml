site_name: Vegate
site_url: https://example.com

extra_css:
  - stylesheets/extra.css

theme:
  name: material
  pallete:
    scheme: slate
    primary: custom
    accent: custom

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.tabs.link
    - toc.follow

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
      toc_depth: 3

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_root_heading: true
            show_root_full_path: false
            show_object_full_path: false
            show_root_toc_entry: true
            show_source: false
            show_bases: false
            show_signature: true
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: true
            docstring_style: google
            # members: true
            # members_order: source
            show_attributes: true
            show_if_no_docstring: true

watch:
  - src

nav:
  - Home: index.md
  - API Reference:
      - OMS: reference/oms.md
      - Markets: reference/markets.md
      - Strategy: reference/strategy.md
