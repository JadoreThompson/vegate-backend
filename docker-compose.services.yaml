services:
  # ===================================================
  # Application
  # ===================================================
  backend:
    image: wifimemes/vegate-backend:latest
    command: uv run src/main.py http run
    environment:
      - SERVICE_NAME=backend
    networks:
      - vegate_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 5s
      start_interval: 5s
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.backend.rule=Host(`vegate.jadore.dev`) && PathPrefix(`/api`)"
        - "traefik.http.routers.backend.service=vegate_stack_backend"
        - "traefik.http.routers.backend.entrypoints=web,websecure"
        - "traefik.http.services.vegate_stack_backend.loadbalancer.server.port=8000"
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
        delay: 3s
        monitor: 30s

  deployment_listener:
    image: wifimemes/vegate-backend:latest
    command: uv run src/main.py deployment listener run
    environment:
      - SERVICE_NAME=deployment_listener
    networks:
      - vegate_network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555/health"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 5s
      start_interval: 5s
    deploy:
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
        delay: 3s
        monitor: 30s

  oms:
    image: wifimemes/vegate-backend:latest
    command: uv run src/main.py oms run --host 0.0.0.0 --port 8082
    environment:
      - SERVICE_NAME=oms
    networks:
      - vegate_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/v1/health"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 5s
      start_interval: 5s
    deploy:
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
        delay: 3s
        monitor: 30s

  ohlc_feed:
    image: wifimemes/vegate-backend:latest
    command: uv run src/main.py markets feed run --host 0.0.0.0 --port 8001 --file instruments.yaml
    environment:
      - SERVICE_NAME=ohlc_feed
    networks:
      - vegate_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555/health"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 5s
      start_interval: 5s
    deploy:
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
        delay: 3s
        monitor: 30s

  backtest_monitor:
    image: wifimemes/vegate-backend:latest
    command: uv run src/main.py backtest monitor run
    environment:
      - SERVICE_NAME=backtest_monitor
    networks:
      - vegate_network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555/health"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 5s
      start_interval: 5s
    deploy:
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
        delay: 3s
        monitor: 30s

  outbox_poller:
    image: wifimemes/vegate-backend:latest
    command: uv run src/main.py outbox run --interval 5 --batch-size 1000
    environment:
      - SERVICE_NAME=outbox_poller
    networks:
      - vegate_network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555/health"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 5s
      start_interval: 5s
    deploy:
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
        delay: 3s
        monitor: 30s

  notification_poller:
    image: wifimemes/vegate-backend:latest
    command: uv run src/main.py notification poller run --interval 2 --batch-size 1000 --timeout 5
    environment:
      - SERVICE_NAME=notification_poller
    networks:
      - vegate_network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555/health"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 5s
      start_interval: 5s
    deploy:
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
        delay: 3s
        monitor: 30s

  docs_server:
    image: wifimemes/vegate-backend-docs:latest
    environment:
      - SERVICE_NAME=docs_server
    networks:
      - vegate_network
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.docs_server.rule=Host(`vegate.jadore.dev`) && PathPrefix(`/docs`)"
        - "traefik.http.routers.docs_server.service=vegate_stack_docs_server"
        - "traefik.http.routers.docs_server.entrypoints=web,websecure"
        - "traefik.http.services.vegate_stack_docs_server.loadbalancer.server.port=80"
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
        delay: 3s
        monitor: 3s

  ohlc_loader_poller:
    image: wifimemes/vegate-backend:latest
    command: uv run src/main.py markets loader run --poll-interval 60 --file instruments.yaml
    environment:
      - SERVICE_NAME=ohlc_loader_poller
    networks:
      - vegate_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555/health"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 5s
      start_interval: 5s
    deploy:
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
        delay: 3s
        monitor: 30s

  traefik:
    image: traefik:v3.6
    command:
      - "--api.insecure=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--providers.swarm=true"
      - "--providers.swarm.network=vegate_network"
      - "--providers.docker=true"
      - "--providers.docker.network=vegate_network"
      - "--log.level=DEBUG"
    ports:
      - 80:80
      - 8080:8080
      - 443:443
    networks:
      - vegate_network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      placement:
        constraints:
          - node.role == manager

  # ===================================================
  # Observability
  # ===================================================

  tempo:
    image: grafana/tempo:latest
    command: ["-config.file=/etc/tempo.yaml"]
    networks:
      - vegate_network
    ports:
      - 3200:3200 # Query frontend
      - 4318:4318 # OTLP HTTP
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml:ro

  loki:
    image: grafana/loki:3.0.0
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - vegate_network
    ports:
      - 3100:3100

  node-exporter:
    image: prom/node-exporter:latest
    restart: unless-stopped
    command:
      - "--path.rootfs=/host"
    networks:
      - vegate_network
    ports:
      - 9100:9100
    volumes:
      - /:/host:ro

  prometheus:
    image: prom/prometheus
    networks:
      - vegate_network
    ports:
      - 9090:9090
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - node-exporter

  grafana:
    image: grafana/grafana
    networks:
      - vegate_network
    ports:
      - 3000:3000
    volumes:
      - ./grafana/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
      - ./grafana/grafana-dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml
      - ./grafana/dashboards:/var/lib/grafana/dashboards

volumes:
  postgres:
  redis:

networks:
  vegate_network:
    driver: overlay
    attachable: true
    external: true
